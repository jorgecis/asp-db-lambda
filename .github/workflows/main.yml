name: Go

on:
    push:
        branches: [master]

permissions:
    contents: read
    packages: read
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7.0.0

            - name: Set up Go
              uses: actions/setup-go@v6.5.0
              with:
                  go-version: "1.26"

            - name: Build
              run: GOARCH=arm64 GOOS=linux CGO_ENABLED=0 go build -o bootstrap -v ./...

            - name: Create Zip File
              run: zip -r9 asp-db.zip bootstrap

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.2.1
              with:
                  role-to-assume: arn:aws:iam::112272741417:role/ASP
                  aws-region: us-east-1

            - name: Update Lamba Source Code
              run: aws lambda update-function-code --function-name arn:aws:lambda:us-east-1:112272741417:function:asp_db --zip-file fileb://./asp-db.zip

    security:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7.0.0

            - name: Set up Go
              uses: actions/setup-go@v6.5.0
              with:
                  go-version: "1.26"

            - name: Run gosec Security Scanner
              uses: securego/gosec@master
              with:
                  args: "./..."
